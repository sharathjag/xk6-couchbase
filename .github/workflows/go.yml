# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["master" ]
  pull_request:
    branches: ["master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Test
      run: make test

    - name: Build
      run: make build

    - name: List Binary
      run: ls .

  validate:
    runs-on: ubuntu-latest
    # Boots a real Couchbase via Docker and runs the examples end-to-end.
    # Non-blocking: container startup can be flaky, and the build/test job above
    # is the authoritative gate.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Validate examples against Couchbase
      run: make validate
